services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: viveros_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_NAME: viveros_db
      # En produccion sobreescriba este valor con un secreto fuerte
      JWT_SECRET: ${JWT_SECRET:-desarrollo-cambiar-en-produccion}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1h}
      # Origenes permitidos por CORS separados por coma; vacio = cualquiera
      FRONTEND_URL: ${FRONTEND_URL:-}
      # Credenciales del primer administrador creado por "npm run seed"
      SEED_ADMIN_CORREO: ${SEED_ADMIN_CORREO:-admin@viveros.local}
      SEED_ADMIN_NOMBRE: ${SEED_ADMIN_NOMBRE:-Administrador}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-Admin123!}
    depends_on:
      - postgres

volumes:
  pgdata:
